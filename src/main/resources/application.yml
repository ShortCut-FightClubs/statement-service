spring:
  application:
    name: ${SPRING_APPLICATION_NAME:statement-service}
  data:
    mongodb:
      uri: mongodb://${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DB:statement_db}

server:
  port: ${SERVER_PORT:8082}

grpc:
  server:
    port: ${GRPC_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,metrics}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.shortcutfightclubs.statement: ${LOG_LEVEL_APP:DEBUG}
